<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Server chassis -->
  <rect x="14" y="14" width="100" height="100" rx="8"/>
  <!-- Top header bar -->
  <line x1="14" y1="38" x2="114" y2="38"/>
  <!-- Power LED in header -->
  <circle cx="26" cy="26" r="5" fill="currentColor"/>
  <!-- Vertical VM divider -->
  <line x1="64" y1="38" x2="64" y2="106"/>
  <!-- VM 1 title bar (left) -->
  <line x1="22" y1="52" x2="58" y2="52"/>
  <circle cx="28" cy="46" r="3" fill="currentColor"/>
  <!-- VM 2 title bar (right) -->
  <line x1="70" y1="52" x2="106" y2="52"/>
  <circle cx="76" cy="46" r="3" fill="currentColor"/>
  <!-- VM 1 content lines -->
  <line x1="22" y1="64" x2="56" y2="64"/>
  <line x1="22" y1="74" x2="50" y2="74"/>
  <line x1="22" y1="84" x2="54" y2="84"/>
  <!-- VM 2 content lines -->
  <line x1="70" y1="64" x2="104" y2="64"/>
  <line x1="70" y1="74" x2="98" y2="74"/>
  <line x1="70" y1="84" x2="102" y2="84"/>
</svg>
