<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Main chassis -->
  <rect x="8" y="28" width="112" height="72" rx="8"/>
  <!-- Bottom status bar -->
  <line x1="8" y1="82" x2="120" y2="82"/>
  <!-- Power LED -->
  <circle cx="20" cy="93" r="4" fill="currentColor"/>
  <!-- Status line -->
  <line x1="34" y1="93" x2="112" y2="93"/>
  <!-- VM partition dividers -->
  <line x1="46" y1="36" x2="46" y2="80"/>
  <line x1="82" y1="36" x2="82" y2="80"/>
  <!-- VM mini screens -->
  <rect x="14" y="40" width="26" height="16" rx="2"/>
  <rect x="52" y="40" width="24" height="16" rx="2"/>
  <rect x="88" y="40" width="26" height="16" rx="2"/>
  <!-- VM activity dots -->
  <circle cx="18" cy="66" r="3" fill="currentColor"/>
  <circle cx="56" cy="66" r="3" fill="currentColor"/>
  <circle cx="92" cy="66" r="3" fill="currentColor"/>
</svg>
