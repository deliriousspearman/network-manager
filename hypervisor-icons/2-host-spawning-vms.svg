<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Physical server base -->
  <rect x="14" y="88" width="100" height="26" rx="6"/>
  <circle cx="26" cy="101" r="4" fill="currentColor"/>
  <line x1="38" y1="101" x2="106" y2="101"/>
  <!-- VM boxes floating above -->
  <rect x="10" y="40" width="30" height="32" rx="4"/>
  <rect x="49" y="28" width="30" height="32" rx="4"/>
  <rect x="88" y="40" width="30" height="32" rx="4"/>
  <!-- Connection lines from server to VMs -->
  <line x1="25" y1="88" x2="25" y2="72"/>
  <line x1="64" y1="88" x2="64" y2="60"/>
  <line x1="103" y1="88" x2="103" y2="72"/>
  <!-- VM indicators -->
  <circle cx="20" cy="50" r="3" fill="currentColor"/>
  <circle cx="59" cy="38" r="3" fill="currentColor"/>
  <circle cx="98" cy="50" r="3" fill="currentColor"/>
</svg>
