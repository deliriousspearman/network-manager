<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Circuit board / chip body -->
  <rect x="16" y="16" width="32" height="32" rx="3"/>
  <!-- Inner chip -->
  <rect x="22" y="22" width="20" height="20" rx="2"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="currentColor"/>
  <!-- Pins top -->
  <line x1="24" y1="16" x2="24" y2="10"/>
  <line x1="32" y1="16" x2="32" y2="10"/>
  <line x1="40" y1="16" x2="40" y2="10"/>
  <!-- Pins bottom -->
  <line x1="24" y1="48" x2="24" y2="54"/>
  <line x1="32" y1="48" x2="32" y2="54"/>
  <line x1="40" y1="48" x2="40" y2="54"/>
  <!-- Pins left -->
  <line x1="16" y1="24" x2="10" y2="24"/>
  <line x1="16" y1="32" x2="10" y2="32"/>
  <line x1="16" y1="40" x2="10" y2="40"/>
  <!-- Pins right -->
  <line x1="48" y1="24" x2="54" y2="24"/>
  <line x1="48" y1="32" x2="54" y2="32"/>
  <line x1="48" y1="40" x2="54" y2="40"/>
</svg>
