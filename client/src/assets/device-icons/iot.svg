<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Circuit board / chip body -->
  <rect x="32" y="32" width="64" height="64" rx="6"/>
  <!-- Inner chip -->
  <rect x="44" y="44" width="40" height="40" rx="4"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="6" fill="currentColor"/>
  <!-- Pins top -->
  <line x1="48" y1="32" x2="48" y2="20"/>
  <line x1="64" y1="32" x2="64" y2="20"/>
  <line x1="80" y1="32" x2="80" y2="20"/>
  <!-- Pins bottom -->
  <line x1="48" y1="96" x2="48" y2="108"/>
  <line x1="64" y1="96" x2="64" y2="108"/>
  <line x1="80" y1="96" x2="80" y2="108"/>
  <!-- Pins left -->
  <line x1="32" y1="48" x2="20" y2="48"/>
  <line x1="32" y1="64" x2="20" y2="64"/>
  <line x1="32" y1="80" x2="20" y2="80"/>
  <!-- Pins right -->
  <line x1="96" y1="48" x2="108" y2="48"/>
  <line x1="96" y1="64" x2="108" y2="64"/>
  <line x1="96" y1="80" x2="108" y2="80"/>
</svg>
